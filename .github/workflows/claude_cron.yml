name: Run Claude Auto Bot Every 5 Hours

on:
  schedule:
    # Cấu hình: Phút 51, vào các giờ 20, 1, 6, 11, 16 (UTC)
    # Tương ứng giờ Việt Nam (UTC+7): 03h51, 08h51, 13h51, 18h51, 23h51
    - cron: '51 20,1,6,11,16 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Run Claude Bot Script
        env:
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          CHAT_URL: ${{ secrets.CHAT_URL }}
        run: python claude_bot.py
