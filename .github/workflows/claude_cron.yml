name: Run Claude Auto Bot Every 5 Hours

on:
  schedule:
    # Chạy tự động mỗi 5 tiếng (vào phút 0 của các giờ 0h, 5h, 10h, 15h, 20h UTC)
    - cron: '0 */5 * * *'
  workflow_dispatch: # Tạo nút bấm chạy thủ công để test bất cứ lúc nào

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Run Claude Bot Script
        env:
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          CHAT_URL: ${{ secrets.CHAT_URL }}
        run: python claude_bot.py
