name: Run Claude Auto Bot Every 5 Hours

on:
  schedule:
    # Tương ứng giờ Việt Nam (UTC+7): 12h11, 17h11, 22h11, 03h11, 08h11
    - cron: '11 5,10,15,20,1 * * *'
  workflow_dispatch: # Giữ nguyên nút chạy thủ công để test khi cần

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Run Claude Bot Script
        env:
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          CHAT_URL: ${{ secrets.CHAT_URL }}
        run: python claude_bot.py
